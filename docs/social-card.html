<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1200,initial-scale=1" />
  <title>Vegetation Structure social card</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; margin: 0; overflow: hidden; }
    body {
      color: #f7f0df;
      background: #0b2117;
      font-family: Aptos, "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    .card {
      position: relative;
      width: 1200px;
      height: 630px;
      display: grid;
      grid-template-columns: 47% 53%;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 8% 88%, rgba(168,217,141,.16), transparent 30%),
        linear-gradient(125deg, #0b2117 0%, #143a26 48%, #07170f 100%);
    }
    .copy {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 58px 34px 56px 76px;
    }
    .kicker {
      margin-bottom: 25px;
      color: #cde58b;
      font-size: 16px;
      font-weight: 850;
      letter-spacing: .17em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      color: #fffaf0;
      font-family: Iowan Old Style, Palatino Linotype, Book Antiqua, Palatino, Georgia, serif;
      font-size: 83px;
      font-weight: 600;
      letter-spacing: -.058em;
      line-height: .84;
    }
    h1 span, h1 em { display: block; }
    h1 em { color: #f0c84f; font-style: normal; }
    .promise {
      max-width: 440px;
      margin: 30px 0 0;
      color: #e6e2d3;
      font-size: 23px;
      line-height: 1.36;
    }
    .art { position: relative; min-width: 0; overflow: hidden; }
    .art::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      z-index: 2;
      width: 155px;
      background: linear-gradient(90deg, #143a26 0%, rgba(20,58,38,.7) 31%, transparent 100%);
    }
    .art img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: 63% 50%;
    }
    .stamp {
      position: absolute;
      z-index: 4;
      right: 34px;
      bottom: 29px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      color: #f7f0df;
      background: rgba(7,23,15,.86);
      border: 1px solid rgba(247,240,223,.3);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .04em;
    }
    .ring {
      width: 16px;
      height: 16px;
      border: 4px solid #f0c84f;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="copy">
      <div class="kicker">NEON Vegetation Structure</div>
      <h1><span>Tagged.</span><span>Measured.</span><em>Still changing.</em></h1>
      <p class="promise">Follow real trees and shrubs through years of change.</p>
    </section>
    <figure class="art">
      <img src="assets/vegetation-living-poster.png" alt="" />
    </figure>
    <div class="stamp"><span class="ring"></span> NEON Explorer Suite · unofficial</div>
  </main>
</body>
</html>
