name: Regenerate derived bytes (manual)

# Option A for the manifest/search-index merge-loop (see docs/neonize-playbook.md §6,
# CLAUDE.md, and AGENTS.md). Vegetation commits TWO derived files — data/search_index.rds
# and manifest.json — and CI fails when either committed copy differs from the validator.
# With no local R, that forces the "push → CI-red-by-design → hand-shuttle the validated
# artifact → re-run" loop that made the ChatGPT/Codex cover rework "fail merges over and
# over". Instead the maintainer dispatches this job on a review/PR branch and the pinned
# validator regenerates BOTH derived files and commits them. It is MANUAL only, uses
# RESTRICTED write, regenerates each file twice and requires byte-identical output,
# verifies the result, and refuses to touch main: a reviewed merge to main stays the sole
# production decision, so the "write only through the final restricted publisher" boundary
# is preserved.
#
# Data refreshes still go through refresh-data.yml; this job only re-derives the two
# committed derived files after a runtime code or data change shifts their bytes.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vegetation-regenerate-derived-${{ github.ref }}
  cancel-in-progress: false

env:
  RSPM: https://packagemanager.posit.co/cran/__linux__/jammy/2026-07-15
  RENV_CONFIG_REPOS_OVERRIDE: https://packagemanager.posit.co/cran/__linux__/jammy/2026-07-15
  VST_RSPM: https://packagemanager.posit.co/cran/__linux__/jammy/2026-07-15
  OPENBLAS_CORETYPE: Haswell
  OPENBLAS_NUM_THREADS: "1"
  OMP_NUM_THREADS: "1"
  VST_LIVE: "0"

jobs:
  regenerate:
    runs-on: ubuntu-22.04
    timeout-minutes: 100
    permissions:
      contents: write
    steps:
      - name: Refuse to write production directly
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "::error::Refusing to run on main. Dispatch this on a review/PR branch; a reviewed merge to main is the only production decision." >&2
            exit 1
          fi

      - name: Checkout the dispatched branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up pinned R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: '4.5.2'
          use-public-rspm: false

      - name: Install runtime and verification closure
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          # Exact closure copied from ci.yml so the manifest records versions that were
          # really compiled here; terra 1.8-50 is the GDAL 3.4.1 pin (see the gotcha catalog).
          packages: >
            shiny, bslib, bsicons, dplyr, tidyr, stringr, tibble, plotly,
            leaflet, DT, shinyjs, shinycssloaders, RColorBrewer, htmltools,
            digest, jsonlite, rsconnect, cpp11,
            url::https://cran.r-project.org/src/contrib/Archive/terra/terra_1.8-50.tar.gz,
            url::https://cran.r-project.org/src/contrib/sf_1.1-1.tar.gz,
            url::https://cran.r-project.org/src/contrib/s2_1.1.11.tar.gz,
            url::https://cran.r-project.org/src/contrib/units_1.0-1.tar.gz,
            url::https://cran.r-project.org/src/contrib/wk_0.9.5.tar.gz,
            url::https://cran.r-project.org/src/contrib/classInt_0.4-11.tar.gz,
            url::https://cran.r-project.org/src/contrib/raster_3.6-32.tar.gz,
            url::https://cran.r-project.org/src/contrib/sp_2.2-1.tar.gz
          pak-version: stable
          dependencies: '"hard"'
          cache-version: vegetation-geo-closure-v2
          cache: always
          install-pandoc: 'false'
          install-quarto: 'false'

      - name: Regenerate the search index twice and require identical bytes
        run: |
          set -euo pipefail
          # The search index feeds the manifest's checksums, so re-derive it first.
          Rscript --vanilla scripts/build_search_index.R
          s1=$(sha256sum data/search_index.rds | awk '{print $1}')
          Rscript --vanilla scripts/build_search_index.R
          s2=$(sha256sum data/search_index.rds | awk '{print $1}')
          if [ "$s1" != "$s2" ]; then
            echo "::error::build_search_index.R is not byte-deterministic; fix determinism before committing an unstable derived index." >&2
            exit 1
          fi

      - name: Regenerate the manifest twice and require identical bytes
        run: |
          set -euo pipefail
          Rscript --vanilla scripts/write_manifest.R
          h1=$(sha256sum manifest.json | awk '{print $1}')
          Rscript --vanilla scripts/write_manifest.R
          h2=$(sha256sum manifest.json | awk '{print $1}')
          if [ "$h1" != "$h2" ]; then
            echo "::error::write_manifest.R is not byte-deterministic; fix canonicalization (strip Built, pin locale) before committing an unstable manifest." >&2
            exit 1
          fi

      - name: Validate the regenerated derived bytes against the bundle
        run: |
          set -euo pipefail
          Rscript --vanilla scripts/verify_manifest.R
          Rscript --vanilla scripts/verify_bundle.R

      - name: Commit the regenerated derived bytes to the dispatched branch
        run: |
          set -euo pipefail
          if git diff --quiet -- data/search_index.rds manifest.json; then
            echo "search_index.rds and manifest.json already match the validator — nothing to commit."
            exit 0
          fi
          branch="${GITHUB_REF#refs/heads/}"
          remote_head=$(git ls-remote --heads origin "refs/heads/$branch" | awk '{print $1}')
          git config user.name "neon-data-bot"
          git config user.email "neon-data-bot@users.noreply.github.com"
          git add -- data/search_index.rds manifest.json
          git commit -m "build: regenerate search_index.rds + manifest.json from the pinned validator [bot]" \
                     -m "Dispatched on $branch from ${GITHUB_SHA}; both derived files regenerated twice (identical bytes) and verify_manifest.R + verify_bundle.R passed. No runtime, data, or science source bytes changed."
          git push --force-with-lease="refs/heads/$branch:$remote_head" origin "HEAD:refs/heads/$branch"
