name: Refresh NEON data bundle

# Monthly rebuild of the per-site Vegetation-structure .rds bundles
# (data/sites/*.rds) + the site index, then a PR. Runs late on the FIRST
# SATURDAY NIGHT of each month (~11pm Arizona time) so any republish lands
# off-peak. NEON publishes on a lag, so a monthly pull keeps the bundled data
# current. Posit Connect Cloud auto-republishes when the PR merges to main.
#
# REQUIRES one repo secret (Settings → Secrets and variables → Actions):
#   NEON_TOKEN   your NEON API token (optional but recommended; speeds the pull)
# Trigger manually from the Actions tab (workflow_dispatch); tick "skip_download"
# to just rebuild the index from the committed bundles (fast, no NEON pull).

on:
  schedule:
    # Every Sunday 06:00 UTC == Saturday 23:00 America/Phoenix (Arizona, no DST).
    # Cron can't express "first Saturday of the month", so we fire every Saturday
    # night and let the `gate` job below proceed only on the first one.
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      skip_download:
        description: "Skip the NEON re-pull; just rebuild the index from committed bundles (fast test)"
        type: boolean
        default: false

permissions:
  contents: write          # commit the refreshed bundle to the PR branch
  pull-requests: write     # open/update the data-refresh PR

jobs:
  # Gate: only the FIRST Saturday night (Arizona time) runs the heavy refresh.
  # Manual runs (workflow_dispatch) always proceed.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          dow=$(TZ='America/Phoenix' date +%u)    # 6 = Saturday
          day=$(TZ='America/Phoenix' date +%-d)   # day-of-month, no leading zero
          if [ "$dow" = "6" ] && [ "$day" -le 7 ]; then
            echo "First Saturday in Arizona (day $day) — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not the first Saturday in Arizona (dow=$dow day=$day) — skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  refresh:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # push to main → Connect Cloud auto-redeploys

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: >
            neonUtilities, dplyr, tibble, tidyr, stringr, jsonlite, rsconnect

      - name: Rebuild the per-site bundles (full NEON re-pull)
        if: ${{ github.event.inputs.skip_download != 'true' }}
        env:
          NEON_TOKEN: ${{ secrets.NEON_TOKEN }}
        run: |
          rm -f data/sites/*.rds
          Rscript scripts/refresh_data.R

      - name: Rebuild the index only (skip-download fast path)
        if: ${{ github.event.inputs.skip_download == 'true' }}
        run: |
          Rscript scripts/build_site_index.R

      # Rebuild the bundled "Search the network" index from the committed per-site
      # bundles (data/sites/*.rds) so it never goes stale. Derives only from
      # committed data, so it runs in BOTH the full-pull and skip-download paths.
      - name: Rebuild the search index
        run: |
          Rscript scripts/build_search_index.R

      # Regenerate the lean manifest.json (CHECK-ONLY gate: fails loud if
      # neonUtilities/arrow slipped in; data.table excused for plotly). Committed
      # below alongside the refreshed bundles so Connect serves a current manifest.
      - name: Regenerate the lean manifest
        run: |
          Rscript scripts/write_manifest.R

      # Commit + push the refreshed bundle DIRECTLY to main — THIS is the deploy:
      # the push makes Connect Cloud auto-republish (no human merge in the loop,
      # matching the Small Mammal / Plant / Beetle siblings). Guarded so it no-ops
      # cleanly when nothing changed.
      - name: Commit & push refreshed bundles to main
        run: |
          git config user.name  "neon-data-bot"
          git config user.email "neon-data-bot@users.noreply.github.com"
          git add -A data          # bundles + site_index + search_index
          git add manifest.json    # regenerated above (root-level, not under data/)
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit or deploy."
          else
            git commit -m "data: monthly NEON vegetation-structure refresh [bot]"
            git push origin HEAD:main
            echo "Pushed refreshed bundles to main — Connect Cloud will redeploy."
          fi
